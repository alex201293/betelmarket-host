version: "3.8"

# Production docker-compose for BetelMarket
# Run from /opt/betelmarket: docker compose -f deploy/docker-compose.prod.yml up -d

services:
  # ─── Redis (cache + queues) ────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: betelmarket-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─── Laravel API ───────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: betelmarket-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/storage:/var/www/html/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Queue Worker ──────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: betelmarket-worker
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/storage:/var/www/html/storage
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600 --max-jobs=1000

  # ─── Scheduler (cron replacement) ─────────────────────────
  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: betelmarket-scheduler
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/storage:/var/www/html/storage
    command: >
      sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"

  # ─── Next.js Frontend ──────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: betelmarket-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=https://${PANEL_DOMAIN:-panel.betelmarket.com}/api
      - NODE_ENV=production

volumes:
  redis_data:
